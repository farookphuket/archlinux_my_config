# =========================================
# TMUX CONFIG - FAROOK MODERN DEV SETUP
# =========================================

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# faster escape
set -sg escape-time 10

# mouse
set -g mouse on

# history
set -g history-limit 100000

# don't rename window automatically
set -g allow-rename off

# =========================================
# TERMINAL
# =========================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# =========================================
# SPLITS
# =========================================

unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

# =========================================
# VIM SMART NAVIGATION
# =========================================

bind -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(n?vim|fzf)$'" \
  "send-keys C-h" "select-pane -L"

bind -n C-j if-shell "ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(n?vim|fzf)$'" \
  "send-keys C-j" "select-pane -D"

bind -n C-k if-shell "ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(n?vim|fzf)$'" \
  "send-keys C-k" "select-pane -U"

bind -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(n?vim|fzf)$'" \
  "send-keys C-l" "select-pane -R"

# =========================================
# RESIZE PANES
# =========================================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================================
# COPY MODE (VIM STYLE)
# =========================================

setw -g mode-keys vi

unbind [
bind Escape copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

bind -T copy-mode-vi MouseDragEnd1Pane \
  send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# paste clipboard
bind p run-shell "tmux set-buffer \"$(xclip -o -selection clipboard)\"; tmux paste-buffer"

# =========================================
# SESSION
# =========================================

bind-key C-s choose-session
bind-key S command-prompt -p "Session name:" "new-session -s '%%'"

# =========================================
# STATUS BAR
# =========================================

set -g status-position bottom
set -g status-interval 1

set -g status-style "bg=#16161e,fg=#a9b1d6"

set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#9ece6a]%Y-%m-%d #[fg=#7dcfff]%H:%M "

setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#565f89"

setw -g window-status-current-format " #[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[default]"
setw -g window-status-current-style "fg=#c0caf5,bg=#16161e"

# =========================================
# PANE COLORS
# =========================================

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# =========================================
# MESSAGE STYLE
# =========================================

set -g message-style "bg=#1a1b26,fg=#7aa2f7,bold"

# =========================================
# URL OPENER
# =========================================

# bind u capture-pane \;\
# save-buffer /tmp/tmux-buffer \;\
# split-window -l 10 "urlview /tmp/tmux-buffer"
bind u run-shell "tmux capture-pane -pS -1000 > /tmp/tmux-buffer && tmux split-window -l 10 'urlscan < /tmp/tmux-buffer'"
# bind u run-shell "tmux capture-pane -pS -1000 > /tmp/tmux-buffer && tmux split-window -l 10 'urlview /tmp/tmux-buffer'"

# =========================================
# TPM (TMUX PLUGIN MANAGER)
# =========================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
