# -----------------------------------------------------------------
# 💎 FONT CONFIGURATION (สูตรลับ IBM Plex Sans Thai)
# -----------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        17.0

# 🎯 มหัศจรรย์จุดสำคัญ: สั่งดักช่วงรหัสภาษาไทย แล้ว Map เข้าหา IBM Plex Sans Thai Looped ทันที
map_font thai IBM Plex Sans Thai Looped

# ปรับค่า Spacing บรรทัดให้อ้าออกเล็กน้อย (110%) เพื่อให้สระบน/ล่าง มีพื้นที่หายใจ ไม่เบียดตัวอังกฤษ
adjust_line_height  110%
adjust_column_width 100%

# -----------------------------------------------------------------
# 🌐 CONFIG TMUX / COLOR PASSTHROUGH (คงไว้ตามสูตรดั้งเดิม)
# -----------------------------------------------------------------
term xterm-kitty
allow_remote_control yes
listen_on unix:@mykitty

background_opacity 0.95
background #1a1b26
foreground #a9b1d6
